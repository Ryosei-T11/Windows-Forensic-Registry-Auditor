version: '3.7'
services:
  otel-collector:
    image: otel/opentelemetry-collector:0.62.0
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - 4317:4317   # OTLP gRPC
      - 55681:55681 # OTLP http (older)
      - 14250:14250 # Jaeger gRPC
      - 14268:14268 # Jaeger HTTP
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro

  jaeger:
    image: jaegertracing/all-in-one:1.46
    ports:
      - 16686:16686
      - 14268:14268

# Default network
networks:
  default:
    name: forensic-otel
